services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - docforge-data:/app/data
    environment:
      - DOCFORGE_DATA_DIR=/app/data
      - DOCFORGE_DB_PATH=/app/data/docforge.db
      - DOCFORGE_UPLOAD_DIR=/app/data/uploads
      - DOCFORGE_OUTPUT_DIR=/app/data/outputs
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  docforge-data:
